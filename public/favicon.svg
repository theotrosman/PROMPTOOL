<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Hexágono superior izquierdo -->
  <polygon points="28,18 50,18 50,38 28,38" fill="url(#g1)" opacity="0.9"/>
  <!-- Triángulo superior izquierdo interior (separación) -->
  <polygon points="28,18 50,18 28,38" fill="white" opacity="0.2"/>

  <!-- Hexágono superior derecho -->
  <polygon points="50,18 72,18 72,38 50,38" fill="url(#g1)" opacity="0.85"/>
  <!-- Triángulo superior derecho interior (separación) -->
  <polygon points="72,18 72,38 50,18" fill="white" opacity="0.2"/>

  <!-- Triángulo central izquierdo -->
  <polygon points="28,38 50,38 28,52" fill="url(#g1)" opacity="0.9"/>

  <!-- Triángulo central derecho -->
  <polygon points="50,38 72,38 72,52" fill="url(#g1)" opacity="0.85"/>

  <!-- Rombo central (cuerpo principal) -->
  <polygon points="28,38 72,38 72,52 28,52" fill="url(#g1)" opacity="0.7"/>

  <!-- Estrella de 4 puntas en el centro superior -->
  <polygon points="50,20 52,28 50,36 48,28" fill="white" opacity="0.95"/>
  <polygon points="42,28 50,26 58,28 50,30" fill="white" opacity="0.95"/>

  <!-- Líneas divisorias del hexágono -->
  <line x1="50" y1="18" x2="50" y2="52" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="28" y1="38" x2="72" y2="38" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="28" y1="18" x2="72" y2="52" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="72" y1="18" x2="28" y2="52" stroke="white" stroke-width="1" opacity="0.4"/>

  <!-- Arco exterior (señal wifi) -->
  <path d="M 34,58 A 16,16 0 0,1 66,58" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
  <!-- Arco medio -->
  <path d="M 39,64 A 11,11 0 0,1 61,64" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
  <!-- Arco interior -->
  <path d="M 44,70 A 6,6 0 0,1 56,70" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
  <!-- Punto central -->
  <circle cx="50" cy="76" r="3" fill="url(#g1)"/>
</svg>
