<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" sizes="359x359">
    <title>Perfil - PrompTool</title>
    <meta name="robots" content="noindex" />
    <!-- NOTE: se elimina el favicon inline para usar el isotipo oficial -->
    <script>
      // /user/nombredeusuario -> redirige a usuario.html?u=nombredeusuario
      const path = window.location.pathname
      const match = path.match(/^\/user\/([^/]+)/)
      if (match) {
        const username = match[1]
        window.location.replace('/usuario.html?u=' + encodeURIComponent(username))
      }
    </script>
    <!-- Google AdSense -->

  </head>

    <div id="root"></div>
  </body>
</html>
